<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — MoGu Agency</title>
  <meta name="robots" content="noindex">

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" sizes="32x32">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 40px 24px; background: var(--cream);
    }
    .error-code {
      font-size: clamp(80px, 18vw, 200px); font-weight: 800;
      letter-spacing: -6px; color: var(--border); line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-size: clamp(24px, 4vw, 40px); font-weight: 800;
      letter-spacing: -1px; color: var(--ink); margin-bottom: 16px;
    }
    .error-text {
      font-size: 16px; color: var(--ink-light); line-height: 1.7;
      max-width: 400px; margin-bottom: 40px;
    }
    .error-logo {
      font-size: 22px; font-weight: 800; color: var(--terracotta);
      letter-spacing: -0.5px; position: absolute; top: 32px; left: 40px;
    }
  </style>
</head>
<body>
  <a href="index.html" class="error-logo">MoGu</a>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">This page wandered off.</h1>
    <p class="error-text">The page you're looking for doesn't exist or has been moved. Let's get you back to filling calendars.</p>
    <a href="index.html" class="btn">Back to homepage →</a>
  </div>
</body>
</html>
