<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — MoGu Agency</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVIGATION -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">MoGu</a>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html" class="nav-active">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <section class="page-header">
    <p class="hero-label">Get in touch</p>
    <h1 class="page-title">Let's build<br>something bold.</h1>
  </section>

  <!-- CONTACT LAYOUT -->
  <section class="contact-layout">

    <!-- LEFT: INFO -->
    <div class="contact-info">
      <p class="contact-intro">Tell us about your project. We'll get back to you within 24 hours.</p>

      <div class="contact-details">
        <div class="contact-detail-item">
          <span class="contact-detail-label">Email</span>
          <span class="contact-detail-value">hello@moguagency.com</span>
        </div>
        <div class="contact-detail-item">
          <span class="contact-detail-label">Based in</span>
          <span class="contact-detail-value">Berlin, Germany</span>
        </div>
        <div class="contact-detail-item">
          <span class="contact-detail-label">Working with</span>
          <span class="contact-detail-value">Clients worldwide</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: FORM -->
    <div class="contact-form-wrap">
      <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

        <div class="form-group">
          <label for="name">Your name</label>
          <input type="text" id="name" name="name" placeholder="Jane Smith" required>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="jane@company.com" required>
        </div>

        <div class="form-group">
          <label for="budget">Budget range</label>
          <select id="budget" name="budget">
            <option value="">Select a range</option>
            <option value="small">€1k – €5k</option>
            <option value="medium">€5k – €20k</option>
            <option value="large">€20k – €50k</option>
            <option value="enterprise">€50k+</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Tell us about your project</label>
          <textarea id="message" name="message" rows="5" placeholder="What are you working on? What's the challenge?" required></textarea>
        </div>

        <button type="submit" class="btn btn-full">Send message</button>

      </form>
    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© 2025 MoGu Agency</p>
  </footer>

  <script src="js/main.js"></script>

</body>
</html>
